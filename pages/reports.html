<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Amisty Company</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/reports.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="animated-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="topnav">
        <div class="topnav-brand">
            <span class="brand-icon">📊</span>
            <h2>Reports</h2>
            <span class="badge" id="userBadge">Seller</span>
        </div>
        <div class="topnav-links">
            <a href="pos.html" class="topnav-link">🏪 POS</a>
            <a href="admin.html" class="topnav-link" id="adminLink" style="display:none;">⚙️ Admin</a>
            <a href="history.html" class="topnav-link" id="historyLink" style="display:none;">📜 History</a>
            <button class="topnav-link btn-exit" onclick="logout()">🚪 Exit</button>
        </div>
    </nav>

    <div class="reports-layout">
        <div class="card filter-card">
            <div class="filter-row">
                <div class="form-group">
                    <label>From</label>
                    <input type="date" id="dateFrom" class="input">
                </div>
                <div class="form-group">
                    <label>To</label>
                    <input type="date" id="dateTo" class="input">
                </div>
                <div class="form-group filter-btns">
                    <button class="btn btn-primary btn-sm" onclick="loadSales()">🔍 Filter</button>
                    <button class="btn btn-ghost btn-sm" onclick="loadToday()">📅 Today</button>
                    <button class="btn btn-ghost btn-sm" onclick="loadThisWeek()">📅 Week</button>
                </div>
            </div>
            <div class="export-row">
                <button class="btn btn-sm btn-primary" onclick="exportCSV()">📥 Export CSV</button>
                <button class="btn btn-sm btn-secondary" onclick="exportWord()">📄 Export Word</button>
            </div>
        </div>

        <div class="summary-grid">
            <div class="summary-card">
                <span class="summary-label">Total Sales</span>
                <span class="summary-value" id="totalSales">Ksh 0.00</span>
            </div>
            <div class="summary-card">
                <span class="summary-label">Total Profit</span>
                <span class="summary-value text-green" id="totalProfit">Ksh 0.00</span>
            </div>
            <div class="summary-card">
                <span class="summary-label">Items Sold</span>
                <span class="summary-value" id="itemsSold">0</span>
            </div>
            <div class="summary-card">
                <span class="summary-label">Transactions</span>
                <span class="summary-value" id="transCount">0</span>
            </div>
        </div>

        <div class="card">
            <div class="panel-header"><h3>📋 Sales List</h3></div>
            <div class="table-wrap">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Items</th>
                            <th>Subtotal</th>
                            <th>Discount</th>
                            <th>Total</th>
                            <th>Profit</th>
                        </tr>
                    </thead>
                    <tbody id="salesBody">
                        <tr><td colspan="6" class="empty-cell">No sales data</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/reports.js"></script>
</body>
</html>
