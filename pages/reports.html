<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Amisty Company</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/reports.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="reports-body">
    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-brand">
            <h2>📊 Reports</h2>
            <span class="user-badge" id="userBadge"></span>
        </div>
        <div class="nav-actions">
            <button class="nav-btn" onclick="location.href='pos.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/></svg>
                POS
            </button>
            <button class="nav-btn" id="adminBtn" onclick="location.href='admin.html'" style="display:none;">⚙️ Admin</button>
            <button class="nav-btn" id="historyBtn" onclick="location.href='history.html'" style="display:none;">📜 History</button>
            <button class="nav-btn logout-btn" onclick="logout()">Exit</button>
        </div>
    </nav>

    <div class="reports-container">
        <!-- Date Filter -->
        <div class="report-filters">
            <div class="date-filter">
                <label>From:</label>
                <input type="date" id="dateFrom">
                <label>To:</label>
                <input type="date" id="dateTo">
                <button class="btn-login" onclick="loadReports()">🔍 Filter</button>
                <button class="btn-login" onclick="loadToday()">📅 Today</button>
            </div>
            <div class="export-buttons">
                <button class="btn-export csv-btn" onclick="exportCSV()">📥 Export CSV</button>
                <button class="btn-export word-btn" onclick="exportWord()">📄 Export Word</button>
            </div>
        </div>

        <!-- Daily Summary Cards -->
        <div class="summary-cards">
            <div class="summary-card">
                <div class="card-label">Total Sales</div>
                <div class="card-value" id="totalSales">Ksh 0.00</div>
            </div>
            <div class="summary-card">
                <div class="card-label">Total Profit</div>
                <div class="card-value" id="totalProfit">Ksh 0.00</div>
            </div>
            <div class="summary-card">
                <div class="card-label">Items Sold</div>
                <div class="card-value" id="itemsSold">0</div>
            </div>
            <div class="summary-card">
                <div class="card-label">Transactions</div>
                <div class="card-value" id="transactionCount">0</div>
            </div>
        </div>

        <!-- Sales Table -->
        <div class="table-container">
            <h3>📋 Sales Transactions</h3>
            <table class="reports-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Items</th>
                        <th>Subtotal</th>
                        <th>Discount</th>
                        <th>Total</th>
                        <th>Profit</th>
                    </tr>
                </thead>
                <tbody id="reportsTableBody">
                    <tr class="empty-row"><td colspan="6">No sales data</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/reports.js"></script>
</body>
</html>
