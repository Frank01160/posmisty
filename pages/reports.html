<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Amisty Company</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/reports.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="animated-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="topnav">
        <div class="topnav-brand">
            <span class="brand-icon">📊</span>
            <h2>Reports</h2>
            <span class="badge" id="userBadge">Seller</span>
        </div>
        <div class="topnav-links">
            <a href="pos.html" class="topnav-link">🏪 POS</a>
            <a href="admin.html" class="topnav-link" id="adminLink" style="display:none;">⚙️ Admin</a>
            <a href="history.html" class="topnav-link" id="historyLink" style="display:none;">📜 History</a>
            <button class="topnav-link btn-exit" onclick="logout()">🚪 Exit</button>
        </div>
    </nav>

    <div class="reports-layout">
        <div class="card filter-card">
            <div class="filter-row">
                <div class="form-group">
                    <label>From</label>
                    <input type="date" id="dateFrom" class="input">
                </div>
                <div class="form-group">
                    <label>To</label>
                    <input type="date" id="dateTo" class="input">
                </div>
                <div class="form-group filter-btns">
                    <button class="btn btn-primary btn-sm" onclick="loadSales()">🔍 Filter</button>
                    <button class="btn btn-ghost btn-sm" onclick="loadToday()">📅 Today</button>
                    <button class="btn btn-ghost btn-sm" onclick="loadThisWeek()">📅 Week</button>
                </div>
            </div>
            <div class="export-row">
                <button class="btn btn-sm btn-primary" onclick="exportCSV()">📥 Export CSV</button>
                <button class="btn btn-sm btn-secondary" onclick="exportWord()">📄 Export Word</button>
            </div>
        </div>

        <div class="summary-grid">
