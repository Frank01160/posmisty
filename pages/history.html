<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop History - Amisty Company</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/history.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="history-body">
    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-brand">
            <h2>📜 Shop History</h2>
            <span class="user-badge">Manager Only</span>
        </div>
        <div class="nav-actions">
            <button class="nav-btn" onclick="location.href='pos.html'">🏪 POS</button>
            <button class="nav-btn" onclick="location.href='admin.html'">⚙️ Admin</button>
            <button class="nav-btn" onclick="location.href='reports.html'">📊 Reports</button>
            <button class="nav-btn logout-btn" onclick="logout()">Exit</button>
        </div>
    </nav>

    <div class="history-container">
        <!-- Filter Section -->
        <div class="history-filters">
            <div class="filter-row">
                <div class="form-group">
                    <label>Filter by Category</label>
                    <select id="historyCategoryFilter" onchange="loadHistory()">
                        <option value="all">All Categories</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Filter by Product</label>
                    <select id="historyProductFilter" onchange="loadHistory()">
                        <option value="all">All Products</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date From</label>
                    <input type="date" id="historyDateFrom">
                </div>
                <div class="form-group">
                    <label>Date To</label>
                    <input type="date" id="historyDateTo">
                </div>
                <button class="btn-login" onclick="loadHistory()">🔍 Apply Filters</button>
            </div>
        </div>

        <!-- Stock Changes History -->
        <div class="history-section">
            <h3>📦 Stock Changes Audit Trail</h3>
            <div class="table-container">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Change Type</th>
                            <th>Quantity Change</th>
                            <th>Reason</th>
                            <th>Done By</th>
                        </tr>
                    </thead>
                    <tbody id="stockHistoryBody">
                        <tr class="empty-row"><td colspan="7">No stock changes recorded</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Sales Performance by Product -->
        <div class="history-section">
            <h3>📊 Product Performance</h3>
            <div class="table-container">
                <table class="history-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Total Sold</th>
                            <th>Revenue</th>
                            <th>Profit</th>
                            <th>Profit Margin</th>
                        </tr>
                    </thead>
                    <tbody id="productPerformanceBody">
                        <tr class="empty-row"><td colspan="6">No data available</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/history.js"></script>
</body>
</html>
