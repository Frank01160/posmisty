<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop History - Amisty Company</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/reports.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="animated-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <nav class="topnav">
        <div class="topnav-brand">
            <span class="brand-icon">📜</span>
            <h2>Shop History</h2>
            <span class="badge badge-admin">Manager</span>
        </div>
        <div class="topnav-links">
            <a href="pos.html" class="topnav-link">🏪 POS</a>
            <a href="admin.html" class="topnav-link">⚙️ Admin</a>
            <a href="reports.html" class="topnav-link">📊 Reports</a>
            <button class="topnav-link btn-exit" onclick="logout()">🚪 Exit</button>
        </div>
    </nav>

    <div class="reports-layout">
        <div class="card filter-card">
            <div class="filter-row">
                <div class="form-group">
                    <label>Category</label>
                    <select id="histCategory" class="select" onchange="loadHistory()">
                        <option value="all">All Categories</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Product</label>
                    <select id="histProduct" class="select" onchange="loadHistory()">
                        <option value="all">All Products</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>From</label>
                    <input type="date" id="histFrom" class="input" onchange="loadHistory()">
                </div>
                <div class="form-group">
                    <label>To</label>
                    <input type="date" id="histTo" class="input" onchange="loadHistory()">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="panel-header"><h3>📦 Stock Changes</h3></div>
            <div class="table-wrap">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Type</th>
                            <th>Change</th>
                            <th>Reason</th>
                            <th>By</th>
                        </tr>
                    </thead>
                    <tbody id="stockHistoryBody">
                        <tr><td colspan="7" class="empty-cell">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <div class="panel-header"><h3>📊 Product Performance</h3></div>
            <div class="table-wrap">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Sold</th>
                            <th>Revenue</th>
                            <th>Profit</th>
                            <th>Margin</th>
                        </tr>
                    </thead>
                    <tbody id="perfBody">
                        <tr><td colspan="5" class="empty-cell">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/reports.js"></script>
</body>
</html>
