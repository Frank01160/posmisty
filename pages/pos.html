<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - Amisty Company</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/pos.css">
    <link rel="stylesheet" href="../css/thermal.css" media="print">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="pos-body">
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-brand">
            <h2>🏪 Amisty POS</h2>
            <span class="user-badge" id="userBadge"></span>
        </div>
        <div class="nav-actions">
            <button class="nav-btn" onclick="location.href='reports.html'" title="Reports">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                Reports
            </button>
<button class="nav-btn" id="adminBtn" onclick="location.href='admin.html'" title="Admin Panel">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                Admin
            </button>
            <button class="nav-btn logout-btn" onclick="logout()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Exit
            </button>
        </div>
    </nav>

    <div class="pos-container">
        <!-- Left Panel - Products -->
        <div class="pos-left">
            <!-- Search & Filter -->
            <div class="pos-filters">
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchProduct" placeholder="Search products..." onkeyup="filterProducts()">
                </div>
                <select id="categoryFilter" onchange="filterProducts()" class="filter-select">
                    <option value="all">📂 All Categories</option>
                </select>
            </div>

            <!-- Products Table -->
            <div class="products-table-container">
                <table class="products-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Stock</th>
                            <th>Price (Ksh)</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <tr class="empty-row">
                            <td colspan="5">No products found</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Right Panel - Basket -->
        <div class="pos-right">
            <div class="basket-header">
                <h3>🛒 Current Sale</h3>
                <button class="btn-clear-basket" onclick="clearBasket()">Clear All</button>
            </div>

            <!-- Basket Items -->
            <div class="basket-items" id="basketItems">
                <div class="empty-basket">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="empty-cart-icon"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                    <p>Basket is empty</p>
                    <span>Add products from the list</span>
                </div>
            </div>

            <!-- Basket Summary -->
            <div class="basket-summary">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">Ksh 0.00</span>
                </div>
                <div class="summary-row discount-row">
                    <span>Discount (Ksh):</span>
                    <input type="number" id="discountInput" placeholder="0" min="0" onchange="updateTotal()" class="discount-input">
                </div>
                <div class="summary-row total-row">
                    <span>TOTAL:</span>
                    <span id="totalAmount">Ksh 0.00</span>
                </div>
            </div>

            <!-- Complete Sale Button -->
            <button class="btn-complete-sale" onclick="completeSale()">
                <span>Complete Sale</span>
                <span id="totalBtnAmount">Ksh 0.00</span>
            </button>
        </div>
    </div>

    <!-- Add to Basket Modal -->
    <div class="modal" id="addToBasketModal">
        <div class="modal-content">
            <span class="close" onclick="closeBasketModal()">&times;</span>
            <div class="modal-header">
                <h3 id="basketProductName">Add Product</h3>
            </div>
            <div class="dual-unit-input">
                <div class="unit-input-group">
                    <label id="primaryUnitLabel">Primary Unit</label>
                    <input type="number" id="primaryUnitInput" placeholder="0" step="0.01" oninput="convertUnits('primary')">
                </div>
                <div class="unit-divider">
                    <span>=</span>
                </div>
                <div class="unit-input-group">
                    <label id="secondaryUnitLabel">Secondary Unit</label>
                    <input type="number" id="secondaryUnitInput" placeholder="0" step="0.01" oninput="convertUnits('secondary')">
                </div>
            </div>
            <div class="unit-info">
                <small id="conversionInfo"></small>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeBasketModal()">Cancel</button>
                <button class="btn-login" onclick="addToBasket()">Add to Basket</button>
            </div>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div class="modal" id="receiptModal">
        <div class="modal-content receipt-modal-content">
            <span class="close" onclick="closeReceiptModal()">&times;</span>
            <div class="receipt" id="receiptContent"></div>
            <div class="receipt-actions">
                <button class="btn-login" onclick="printReceipt()">🖨️ Print Receipt</button>
                <button class="btn-cancel" onclick="closeReceiptModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="../js/firebase-config.js"></script>
    <script src="../js/pos.js"></script>
</body>
</html>
