<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - Amisty Company</title>
    
    <!-- ✅ FIREBASE SDKs (MUST BE FIRST - These were missing!) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/pos.css">
    <link rel="stylesheet" href="../css/thermal.css" media="print">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="pos-body">
    <!-- Top Navigation Bar -->
    <nav class="top-nav">
        <div class="nav-brand">
            <h2>🏪 Amisty POS</h2>
            <span class="user-badge" id="userBadge"></span>
        </div>
        <div class="nav-actions">
            <button class="nav-btn" onclick="location.href='reports.html'" title="Reports">
                📊 Reports
            </button>
            <button class="nav-btn" id="adminBtn" onclick="location.href='admin.html'" title="Admin Panel">
                ⚙️ Admin
            </button>
            <button class="nav-btn logout-btn" onclick="logout()">
                🚪 Exit
            </button>
        </div>
    </nav>

    <div class="pos-container">
        <!-- Left Panel - Products -->
        <div class="pos-left">
            <!-- Search & Filter -->
            <div class="pos-filters">
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="searchProduct" placeholder="Search products..." onkeyup="filterProducts()">
                </div>
                <select id="categoryFilter" onchange="filterProducts()" class="filter-select">
                    <option value="all">📂 All Categories</option>
                </select>
            </div>

            <!-- Products Table -->
            <div class="products-table-container">
                <table class="products-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Stock</th>
                            <th>Price (Ksh)</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="productsTableBody">
                        <tr class="empty-row">
                            <td colspan="5">⏳ Loading products...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Right Panel - Basket -->
        <div class="pos-right">
            <div class="basket-header">
                <h3>🛒 Current Sale</h3>
                <button class="btn-clear-basket" onclick="clearBasket()">Clear All</button>
            </div>

            <!-- Basket Items -->
            <div class="basket-items" id="basketItems">
                <div class="empty-basket">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="empty-cart-icon"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
                    <p>Basket is empty</p>
                    <span>Add products from the list</span>
                </div>
            </div>

            <!-- Basket Summary -->
            <div class="basket-summary">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">Ksh 0.00</span>
                </div>
                <div class="summary-row discount-row">
                    <span>Discount (Ksh):</span>
                    <input type="number" id="discountInput" placeholder="0" min="0" onchange="updateTotal()" class="discount-input">
                </div>
                <div class="summary-row total-row">
                    <span>TOTAL:</span>
                    <span id="totalAmount">Ksh 0.00</span>
                </div>
            </div>

            <!-- Complete Sale Button -->
            <button class="btn-complete-sale" onclick="completeSale()">
                <span>Complete Sale</span>
                <span id="totalBtnAmount">Ksh 0.00</span>
            </button>
        </div>
    </div>

    <!-- Add to Basket Modal -->
    <div class="modal" id="addToBasketModal">
        <div class="modal-content">
            <span class="close" onclick="closeBasketModal()">&times;</span>
            <div class="modal-header">
                <h3 id="basketProductName">Add Product</h3>
            </div>
            <div class="dual-unit-input">
                <div class="unit-input-group">
                    <label id="primaryUnitLabel">Primary Unit</label>
                    <input type="number" id="primaryUnitInput" placeholder="0" step="0.01" oninput="convertUnits('primary')">
                </div>
                <div class="unit-divider">
                    <span>=</span>
                </div>
                <div class="unit-input-group">
                    <label id="secondaryUnitLabel">Secondary Unit</label>
                    <input type="number" id="secondaryUnitInput" placeholder="0" step="0.01" oninput="convertUnits('secondary')">
                </div>
            </div>
            <div class="unit-info">
                <small id="conversionInfo"></small>
            </div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeBasketModal()">Cancel</button>
                <button class="btn-login" onclick="addToBasket()">Add to Basket</button>
            </div>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div class="modal" id="receiptModal">
        <div class="modal-content receipt-modal-content">
            <span class="close" onclick="closeReceiptModal()">&times;</span>
            <div class="receipt" id="receiptContent"></div>
            <div class="receipt-actions">
                <button class="btn-login" onclick="printReceipt()">🖨️ Print Receipt</button>
                <button class="btn-cancel" onclick="closeReceiptModal()">Close</button>
            </div>
        </div>
    </div>

    <!-- Load Firebase Config first, then POS JS -->
    <script src="../js/firebase-config.js"></script>
    <script src="../js/pos.js"></script>
</body>
</html>
